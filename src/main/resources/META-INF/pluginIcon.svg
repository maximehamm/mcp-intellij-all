<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24">
  <!-- Carré IDE (bleu clair) — trait part de son bord droit -->
  <rect x="4" y="4" width="6" height="6" rx="1" fill="#60A5FA"/>
  <!-- Carré IA (bleu foncé) — trait part de son bord gauche -->
  <rect x="14" y="14" width="6" height="6" rx="1" fill="#1E40AF"/>
  <!-- Arc bleu clair : part du bord droit du carré bleu clair, s'arrête avant le carré bleu foncé -->
  <path d="M10 7h7a2 2 0 0 1 2 2v3" stroke="#60A5FA" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Arc bleu foncé : part du bord gauche du carré bleu foncé, s'arrête avant le carré bleu clair -->
  <path d="M14 17H7a2 2 0 0 1-2-2v-3" stroke="#1E40AF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
